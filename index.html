<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembukuan Haul Alumni AL ALBAB</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1 id="namaKegiatan">PEMBUKUAN HAUL ALUMNI AL ALBAB</h1>
    <p id="infoKegiatan">Sistem Pembukuan Online</p>
</header>

<nav class="navbar">

    <button class="nav-btn active" data-page="dashboard">
        Dashboard
    </button>

    <button class="nav-btn" data-page="kasMasuk">
        Kas Masuk
    </button>

    <button class="nav-btn" data-page="kasKeluar">
        Kas Keluar
    </button>

</nav>

<main>

<!-- ================= Dashboard ================= -->

<section id="dashboard" class="page active">

<div class="card-grid">

<div class="card">
<h3>Kas Masuk</h3>
<h2 id="kasMasuk">Rp0</h2>
</div>

<div class="card">
<h3>Kas Cash</h3>
<h2 id="kasCash">Rp0</h2>
</div>

<div class="card">
<h3>Kas Rekening</h3>
<h2 id="kasRekening">Rp0</h2>
</div>

<div class="card">
<h3>Kas Keluar</h3>
<h2 id="kasKeluar">Rp0</h2>
</div>

<div class="card saldo">
<h3>Saldo Kas</h3>
<h2 id="saldoKas">Rp0</h2>
</div>

</div>

</section>

<!-- ================= Kas Masuk ================= -->

<section id="kasMasuk" class="page">

<div class="toolbar">

<input
type="text"
id="searchMasuk"
placeholder="Cari Donatur..."
>

</div>

<div class="table-container">

<table id="tableMasuk">

<thead>

<tr>

<th>Tanggal</th>
<th>Nama</th>
<th>Kabupaten</th>
<th>Metode</th>
<th>Via</th>
<th>Nominal</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</section>

<!-- ================= Kas Keluar ================= -->

<section id="kasKeluar" class="page">

<div class="toolbar">

<input
type="text"
id="searchKeluar"
placeholder="Cari Pengeluaran..."
>

</div>

<div class="table-container">

<table id="tableKeluar">

<thead>

<tr>

<th>Tanggal</th>
<th>Keperluan</th>
<th>Kategori</th>
<th>Penerima</th>
<th>Nominal</th>
<th>Dibayar Oleh</th>
<th>Keterangan</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</section>

</main>

<footer>

<p>
© 2026 Haul Alumni AL ALBAB
</p>

</footer>

<script src="script.js"></script>

</body>
</html>
