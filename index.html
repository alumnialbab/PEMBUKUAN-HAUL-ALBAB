<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pembukuan Haul Alumni AL ALBAB</title>
<link href="style.css" rel="stylesheet"/>
</head>
<body>
<header class="header">
<h1 id="namaKegiatan">PEMBUKUAN HAUL ALUMNI AL ALBAB</h1>
<p id="infoKegiatan">Sistem Pembukuan Online</p>
</header>
<nav class="navbar">
<button class="nav-btn active" data-page="dashboard">
        Dashboard
    </button>
<button class="nav-btn" data-page="kasMasuk">
        Kas Masuk
    </button>
<button class="nav-btn" data-page="kasKeluar">
        Kas Keluar
    </button>
</nav>
<main>
<!-- ================= Dashboard ================= -->
<section class="page active" id="dashboard">
<div class="card-grid">
<div class="card">
<h3>Kas Masuk</h3>
<h2 id="totalKasMasuk">Rp0</h2>
</div>
<div class="card">
<h3>Kas Cash</h3>
<h2 id="totalKasCash">Rp0</h2>
</div>
<div class="card">
<h3>Kas Rekening</h3>
<h2 id="totalKasRekening">Rp0</h2>
</div>
<div class="card">
<h3>Kas Keluar</h3>
<h2 id="totalKasKeluar">Rp0</h2>
</div>
<div class="card saldo">
<h3>Saldo Kas</h3>
<h2 id="totalSaldoKas">Rp0</h2>
</div>
</div>
</section>
<!-- ================= Kas Masuk ================= -->
<section class="page" id="kasMasuk">
<div class="toolbar">
<input id="searchMasuk" placeholder="Cari Donatur..." type="text"/>
</div>
<div class="table-container">
<table id="tableMasuk">
<thead>
<tr>
<th>Tanggal</th>
<th>Nama</th>
<th>Kabupaten</th>
<th>Metode</th>
<th>Via</th>
<th>Nominal</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>
</section>
<!-- ================= Kas Keluar ================= -->
<section class="page" id="kasKeluar">
<div class="toolbar">
<input id="searchKeluar" placeholder="Cari Pengeluaran..." type="text"/>
</div>
<div class="table-container">
<table id="tableKeluar">
<thead>
<tr>
<th>Tanggal</th>
<th>Keperluan</th>
<th>Kategori</th>
<th>Penerima</th>
<th>Nominal</th>
<th>Dibayar Oleh</th>
<th>Keterangan</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>
</section>
</main>
<footer>
<p>
© 2026 Haul Alumni AL ALBAB
</p>
</footer>
<script src="script.js"></script>
</body>
</html>
